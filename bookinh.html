<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homeopathy Appointment Booking</title>

  <!-- Modern font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --lavender-1: #c7b8ff;
      --lavender-2: #b39dff;
      --lavender-3: #eae4ff;
      --blue-1: #b9d8ff;
      --blue-2: #8fc2ff;
      --white: #ffffff;
      --text-dark: #2f2a45;
      --text-light: #f7f4ff;
      --shadow-light: rgba(255, 255, 255, 0.9);
      --shadow-dark: rgba(155, 137, 209, 0.35);
      --primary: #8c74ff;
      --primary-hover: #7a61f0;
      --error: #d94b7a;
      --success: #1f9d61;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f3eeff 0%, #e7ddff 50%, #ddd0ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text-dark);
    }

    .booking-card {
      width: 100%;
      max-width: 980px;
      min-height: 560px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-radius: 28px;
      overflow: hidden;
      background: var(--white);
      box-shadow:
        12px 12px 30px rgba(176, 160, 224, 0.35),
        -10px -10px 26px rgba(255, 255, 255, 0.9);
    }

    /* LEFT SECTION */
    .left-panel {
      background: linear-gradient(160deg, #9f86f2 0%, #8768e0 55%, #6f5bcb 100%);
      color: #1f1b2e;
      padding: 42px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 24px;
      position: relative;
      isolation: isolate;
    }

    .left-panel::before,
    .left-panel::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      z-index: -1;
      opacity: 0.55;
      filter: blur(1px);
    }

    .left-panel::before {
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, #e8deff 0%, #bcd4ff 74%);
      top: -70px;
      right: -70px;
    }

    .left-panel::after {
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, #d7cbff 0%, #94bcff 74%);
      bottom: -60px;
      left: -50px;
    }

    .medical-icon-wrap {
      width: 210px;
      height: 210px;
      border-radius: 28px;
      background: linear-gradient(145deg, #e5dbff, #b6cbff);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset 8px 8px 16px rgba(126, 105, 194, 0.35),
        inset -8px -8px 16px rgba(230, 221, 255, 0.55),
        10px 10px 24px rgba(104, 82, 177, 0.3);
      overflow: hidden;
    }

    .medical-image {
      width: 84%;
      height: 84%;
      object-fit: contain;
      filter: drop-shadow(0 8px 12px rgba(69, 44, 143, 0.22));
    }

    .medical-svg {
      width: 84%;
      height: 84%;
      filter: drop-shadow(0 8px 12px rgba(69, 44, 143, 0.22));
    }

    .intro-text {
      max-width: 370px;
      line-height: 1.8;
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 0.2px;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(46, 25, 105, 0.4);
    }

    /* RIGHT SECTION */
    .right-panel {
      background: linear-gradient(155deg, #ffffff 0%, #f5f8ff 100%);
      padding: 42px 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-wrap {
      width: 100%;
      max-width: 360px;
    }

    .form-wrap h2 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 1.85rem;
      color: #4b3f70;
      font-weight: 600;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.92rem;
      color: #625a80;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 13px 15px;
      font-size: 0.96rem;
      background: #f8f6ff;
      color: var(--text-dark);
      box-shadow:
        inset 4px 4px 8px rgba(180, 165, 228, 0.28),
        inset -4px -4px 8px rgba(255, 255, 255, 0.95);
      outline: none;
      transition: all 0.25s ease;
    }

    .input-group input:focus {
      background: #ffffff;
      box-shadow:
        0 0 0 3px rgba(140, 116, 255, 0.18),
        inset 4px 4px 8px rgba(180, 165, 228, 0.2),
        inset -4px -4px 8px rgba(255, 255, 255, 1);
      transform: translateY(-1px);
    }

    .book-btn {
      width: 100%;
      margin-top: 10px;
      border: none;
      border-radius: 999px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #7f6cff, #7eafff);
      cursor: pointer;
      box-shadow:
        7px 7px 16px rgba(140, 116, 255, 0.32),
        -4px -4px 12px rgba(255, 255, 255, 0.9);
      transition: all 0.25s ease;
    }

    .book-btn:hover {
      background: linear-gradient(135deg, var(--primary-hover), #709fff);
      transform: translateY(-2px);
      box-shadow:
        10px 10px 20px rgba(140, 116, 255, 0.35),
        -6px -6px 14px rgba(255, 255, 255, 0.95);
    }

    .book-btn:active {
      transform: translateY(0);
    }

    .message {
      margin-top: 14px;
      font-size: 0.92rem;
      text-align: center;
      min-height: 24px;
    }

    .message.error {
      color: var(--error);
    }

    .message.success {
      color: var(--success);
    }

    /* Responsive */
    @media (max-width: 860px) {
      .booking-card {
        grid-template-columns: 1fr;
        max-width: 520px;
      }

      .left-panel {
        min-height: 280px;
        padding: 34px 22px;
      }

      .right-panel {
        padding-top: 26px;
      }

      .form-wrap h2 {
        font-size: 1.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="booking-card">
    <!-- LEFT SECTION -->
    <section class="left-panel">
      <div class="medical-icon-wrap">
        <svg class="medical-svg" viewBox="0 0 256 256" aria-label="Stethoscope illustration" role="img">
          <defs>
            <linearGradient id="tubeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6b4fd3" />
              <stop offset="100%" stop-color="#4d9cf5" />
            </linearGradient>
          </defs>

          <circle cx="128" cy="128" r="122" fill="#eef4ff" />

          <path
            d="M78 40v62c0 27 22 49 50 49s50-22 50-49V40"
            fill="none"
            stroke="url(#tubeGrad)"
            stroke-width="15"
            stroke-linecap="round"
          />
          <circle cx="78" cy="36" r="12" fill="#6b4fd3" />
          <circle cx="178" cy="36" r="12" fill="#4d9cf5" />

          <path
            d="M128 151v20c0 20 16 36 36 36h16"
            fill="none"
            stroke="url(#tubeGrad)"
            stroke-width="14"
            stroke-linecap="round"
          />

          <circle cx="198" cy="207" r="22" fill="#ffffff" stroke="#4d9cf5" stroke-width="10" />
          <circle cx="198" cy="207" r="8" fill="#7d67df" />
        </svg>
      </div>

      <p class="intro-text">
        Hello, I'm Dr. Yamini Priya, a BHMS intern with a passion for holistic health.
        I'm here to assist with your health concerns. Let's work together towards your
        wellness goals.
      </p>
    </section>

    <!-- RIGHT SECTION -->
    <section class="right-panel">
      <div class="form-wrap">
        <h2>Book Appointment</h2>

        <!-- Replace YOUR_FORM_ID with your Formspree form ID -->
        <form id="appointmentForm" action="https://formspree.io/f/xlgakoje" method="POST">
          <div class="input-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" placeholder="Enter your name" required />
          </div>

          <div class="input-group">
            <label for="age">Age</label>
            <input type="number" id="age" name="age" placeholder="Enter your age" required />
          </div>

          <div class="input-group">
            <label for="contactNumber">Contact Number</label>
            <input
              type="tel"
              id="contactNumber"
              name="contactNumber"
              placeholder="Enter your contact number"
              required
            />
          </div>

          <button class="book-btn" type="submit">Book Now</button>
          <p id="formMessage" class="message"></p>
        </form>
      </div>
    </section>
  </div>

  <script>
    const form = document.getElementById("appointmentForm");
    const message = document.getElementById("formMessage");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      message.textContent = "";
      message.className = "message";

      const fullName = document.getElementById("fullName").value.trim();
      const age = parseInt(document.getElementById("age").value, 10);
      const contactNumber = document.getElementById("contactNumber").value.trim();

      // Basic validation
      if (fullName.length < 3) {
        showError("Please enter a valid full name (min 3 characters).");
        return;
      }

      if (isNaN(age) || age < 1 || age > 120) {
        showError("Please enter a valid age between 1 and 120.");
        return;
      }

      // Only digits, allow 10-15 digits for flexibility
      const phoneRegex = /^\d{10,15}$/;
      if (!phoneRegex.test(contactNumber)) {
        showError("Please enter a valid contact number (10 to 15 digits).");
        return;
      }

      try {
        const response = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: {
            Accept: "application/json",
          },
        });

        if (response.ok) {
          form.reset();
          message.textContent = "Appointment booked successfully! We will contact you soon.";
          message.classList.add("success");
        } else {
          showError("Something went wrong. Please try again.");
        }
      } catch (error) {
        showError("Network error. Please check your connection and try again.");
      }
    });

    function showError(text) {
      message.textContent = text;
      message.classList.add("error");
    }
  </script>
</body>
</html>
